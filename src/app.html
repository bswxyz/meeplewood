<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    document.documentElement.classList.add('js');
    try {
      var t = localStorage.getItem('meeplewood-theme');
      if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
  <meta name="theme-color" content="#f3ecdf" />
  <meta name="color-scheme" content="light dark" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 10a14 14 0 0 1 14 14c0 6-3 10-6.5 13 11 3 22.5 10 26.5 17.5 3 6-1.5 12.5-8.5 12.5H63.5c2.5 8 6.5 17 6.5 21H30c0-4 4-13 6.5-21H24.5c-7 0-11.5-6.5-8.5-12.5C20 47 31.5 40 42.5 37 39 34 36 30 36 24a14 14 0 0 1 14-14z' fill='%231f8a8a'/%3E%3C/svg%3E" />
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
